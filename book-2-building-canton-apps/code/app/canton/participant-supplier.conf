include required("shared.conf")

canton {
  participants {
    participantSupplier {
      storage {
        type = postgres
        config {
          dataSourceClass =
            "org.postgresql.ds.PGSimpleDataSource"
          properties {
            serverName = "localhost"
            portNumber = 5432
            databaseName = "participant_supplier"
            user = "canton"
            password = "canton"
          }
        }
      }

      ledger-api {
        address = "0.0.0.0"
        port = 5011
      }

      admin-api {
        address = "0.0.0.0"
        port = 5012
      }

      http-ledger-api {
        address = "0.0.0.0"
        port = 5013
      }
    }
  }
}
