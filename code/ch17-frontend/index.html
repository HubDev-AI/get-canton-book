<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>License Manager -- Ch17 Frontend</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
      h1 { border-bottom: 2px solid #333; padding-bottom: .5rem; }
      h2 { margin-top: 2rem; }
      table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
      th, td { padding: .5rem .75rem; border: 1px solid #ddd; text-align: left; }
      th { background: #f5f5f5; }
      form { display: flex; flex-wrap: wrap; gap: .5rem; margin: 1rem 0; }
      input { padding: .4rem .6rem; border: 1px solid #ccc; border-radius: 4px; }
      button { padding: .4rem 1rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
      button:hover { background: #1d4ed8; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
