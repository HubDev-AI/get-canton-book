include required("shared.conf")

canton {
  sequencers {
    sequencer1 {
      storage {
        type = postgres
        config {
          dataSourceClass =
            "org.postgresql.ds.PGSimpleDataSource"
          properties {
            serverName = "localhost"
            portNumber = 5432
            databaseName = "sequencer1"
            user = "canton"
            password = "canton"
          }
        }
      }

      public-api {
        address = "0.0.0.0"
        port = 5001
      }

      admin-api {
        address = "0.0.0.0"
        port = 5002
      }

      sequencer {
        type = BFT
      }
    }
  }
}
