include required("shared.conf")

canton {
  participants {
    participantFactor {
      storage {
        type = postgres
        config {
          dataSourceClass =
            "org.postgresql.ds.PGSimpleDataSource"
          properties {
            serverName = "localhost"
            portNumber = 5432
            databaseName = "participant_factor"
            user = "canton"
            password = "canton"
          }
        }
      }

      ledger-api {
        address = "0.0.0.0"
        port = 5031
      }

      admin-api {
        address = "0.0.0.0"
        port = 5032
      }

      http-ledger-api {
        address = "0.0.0.0"
        port = 5033
      }
    }
  }
}
