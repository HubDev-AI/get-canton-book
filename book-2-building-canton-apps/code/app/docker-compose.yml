services:
  postgres:
    image: postgres:16
    command:
      - postgres
      - -c
      - max_connections=300
    environment:
      POSTGRES_USER: canton
      POSTGRES_PASSWORD: canton
      POSTGRES_DB: canton
    ports:
      - "5432:5432"
    volumes:
      - canton-pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  canton-pgdata:
