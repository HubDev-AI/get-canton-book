include required("shared.conf")

canton {
  sequencers {
    sequencer1 {
      storage {
        type = postgres
        config {
          dataSourceClass =
            "org.postgresql.ds.PGSimpleDataSource"
          properties {
            serverName = "localhost"
            portNumber = 5432
            databaseName = "sequencer1"
            user = "canton"
            password = "canton"
          }
        }
      }
      public-api {
        address = "0.0.0.0"
        port = 5001
      }
      admin-api {
        address = "0.0.0.0"
        port = 5002
      }
      sequencer {
        type = BFT
      }
    }
  }

  mediators {
    mediator1 {
      storage {
        type = postgres
        config {
          dataSourceClass =
            "org.postgresql.ds.PGSimpleDataSource"
          properties {
            serverName = "localhost"
            portNumber = 5432
            databaseName = "mediator1"
            user = "canton"
            password = "canton"
          }
        }
      }
      admin-api {
        address = "0.0.0.0"
        port = 5202
      }
    }
  }

  participants {
    participantSupplier {
      storage {
        type = postgres
        config {
          dataSourceClass =
            "org.postgresql.ds.PGSimpleDataSource"
          properties {
            serverName = "localhost"
            portNumber = 5432
            databaseName = "participant_supplier"
            user = "canton"
            password = "canton"
          }
        }
      }
      ledger-api.port = 5011
      admin-api.port = 5012
      http-ledger-api.port = 5013
    }

    participantBuyer {
      storage {
        type = postgres
        config {
          dataSourceClass =
            "org.postgresql.ds.PGSimpleDataSource"
          properties {
            serverName = "localhost"
            portNumber = 5432
            databaseName = "participant_buyer"
            user = "canton"
            password = "canton"
          }
        }
      }
      ledger-api.port = 5021
      admin-api.port = 5022
      http-ledger-api.port = 5023
    }

    participantFactor {
      storage {
        type = postgres
        config {
          dataSourceClass =
            "org.postgresql.ds.PGSimpleDataSource"
          properties {
            serverName = "localhost"
            portNumber = 5432
            databaseName = "participant_factor"
            user = "canton"
            password = "canton"
          }
        }
      }
      ledger-api.port = 5031
      admin-api.port = 5032
      http-ledger-api.port = 5033
    }
  }

  monitoring.metrics {
    jvm-metrics.enabled = yes
    reporters = [
      {
        type = prometheus
        address = 0.0.0.0
        port = 9000
      }
    ]
  }
}
